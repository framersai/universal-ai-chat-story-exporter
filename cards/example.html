<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Template</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: #f3f4f6;
    font-family: Arial, sans-serif;
  }

  .card {
    width: 800px;
    height: 420px;
    background: #ffffff;
    border-radius: 16px;
    overflow: hidden;
    display: flex;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  .card-image {
    width: 40%;
    background-size: cover;
    background-position: center;
  }

  .card-content {
    width: 60%;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .card-title {
    font-size: 26px;
    font-weight: bold;
    color: #111827;
    line-height: 1.3;
    margin-bottom: 12px;
  }

  .card-description {
    font-size: 16px;
    color: #4b5563;
    line-height: 1.5;
    flex-grow: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 16px;
  }

  .card-author {
    font-size: 14px;
    color: #6b7280;
  }

  .card-tag {
    font-size: 12px;
    background: #e5e7eb;
    color: #374151;
    padding: 6px 10px;
    border-radius: 999px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-image" style="background-image: url('{{imageUrl}}');"></div>

  <div class="card-content">
    <div>
      <div class="card-title">{{title}}</div>
      <div class="card-description">{{description}}</div>
    </div>

    <div class="card-footer">
      <div class="card-author">{{author}}</div>
      <div class="card-tag">{{tag}}</div>
    </div>
  </div>
</div>

</body>
</html>
